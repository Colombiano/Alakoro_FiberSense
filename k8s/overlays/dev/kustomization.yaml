apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: alakoro-dev

resources:
  - ../../base

namePrefix: dev-

commonLabels:
  environment: dev

replicas:
  - name: alakoro-backend
    count: 1
  - name: alakoro-frontend
    count: 1
  - name: alakoro-celery
    count: 1

patches:
  - target:
      kind: Deployment
      name: alakoro-backend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
