apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: alakoro-prod

resources:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: prod

replicas:
  - name: alakoro-backend
    count: 3
  - name: alakoro-frontend
    count: 3
  - name: alakoro-celery
    count: 4

patches:
  - target:
      kind: Deployment
      name: alakoro-backend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
  - target:
      kind: HorizontalPodAutoscaler
      name: alakoro-backend-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20
  - target:
      kind: Ingress
      name: alakoro-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: alakoro.prod.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: alakoro.prod.example.com
