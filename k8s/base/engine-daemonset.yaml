apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alakoro-engine
  namespace: alakoro
  labels:
    app: alakoro-engine
spec:
  selector:
    matchLabels:
      app: alakoro-engine
  template:
    metadata:
      labels:
        app: alakoro-engine
    spec:
      containers:
        - name: engine
          image: alakoro/engine:latest
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: engine-socket
              mountPath: /tmp/engine
      volumes:
        - name: engine-socket
          hostPath:
            path: /var/run/alakoro
            type: DirectoryOrCreate
