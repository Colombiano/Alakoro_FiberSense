apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alakoro-frontend-hpa
  namespace: alakoro
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alakoro-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
