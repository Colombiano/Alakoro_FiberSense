apiVersion: apps/v1
kind: Deployment
metadata:
  name: alakoro-backend
  namespace: alakoro
  labels:
    app: alakoro-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alakoro-backend
  template:
    metadata:
      labels:
        app: alakoro-backend
    spec:
      containers:
        - name: backend
          image: alakoro/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: alakoro-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
