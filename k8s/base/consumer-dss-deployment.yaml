apiVersion: apps/v1
kind: Deployment
metadata:
  name: alakoro-consumer-dss
  namespace: alakoro
  labels:
    app: alakoro-consumer-dss
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alakoro-consumer-dss
  template:
    metadata:
      labels:
        app: alakoro-consumer-dss
    spec:
      containers:
        - name: consumer
          image: alakoro/backend:latest
          command: ["python", "-m", "app.consumers", "--type", "dss"]
          envFrom:
            - configMapRef:
                name: alakoro-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
