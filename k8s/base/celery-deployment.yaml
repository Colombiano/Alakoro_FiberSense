apiVersion: apps/v1
kind: Deployment
metadata:
  name: alakoro-celery
  namespace: alakoro
  labels:
    app: alakoro-celery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alakoro-celery
  template:
    metadata:
      labels:
        app: alakoro-celery
    spec:
      containers:
        - name: celery
          image: alakoro/backend:latest
          command: ["celery", "-A", "app.core.celery", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: alakoro-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
