apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alakoro-ingress
  namespace: alakoro
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - alakoro.example.com
      secretName: alakoro-tls
  rules:
    - host: alakoro.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alakoro-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: alakoro-backend
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: alakoro-backend
                port:
                  number: 8000
