global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'alakoro-backend'
    static_configs:
      - targets: ['alakoro-backend:8000']
    metrics_path: /metrics

  - job_name: 'alakoro-frontend'
    static_configs:
      - targets: ['alakoro-frontend:80']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
