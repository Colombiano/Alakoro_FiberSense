# ═══════════════════════════════════════════════════════════════════
# Alakoro FiberSense — CI: Release Automático (GitHub + PyPI + Docker)
# CI: Automated Release (GitHub + PyPI + Docker)
# ═══════════════════════════════════════════════════════════════════

name: 🚀 Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Necessário para trusted publishing no PyPI

jobs:
  # ─── Testes pré-release / Pre-release tests ───
  test:
    name: 🧪 Testar antes do release / Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install -r requirements.txt
          pytest tests/ -v

  # ─── Build do pacote Python / Python package build ───
  build:
    name: 📦 Build do pacote / Build package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install build twine
          python -m build
      - name: ⬆️  Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ─── Publicar no PyPI / Publish to PyPI ───
  publish-pypi:
    name: 📦 Publicar no PyPI / Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/alakoro-fibersense
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: 📦 Publicar no PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          print-hash: true

  # ─── Publicar no GitHub Releases / Publish to GitHub Releases ───
  publish-github:
    name: 🚀 Release no GitHub / GitHub Release
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: 🚀 Criar Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          body: |
            🎸 **Alakoro FiberSense v${{ github.ref_name }}** — Release Oficial!

            ### 🚀 Instalação Rápida / Quick Install

            #### 🟢 Modo Leigo / Easy Mode
            ```bash
            pip install alakoro-fibersense==${{ github.ref_name }}
            ```

            #### 🔵 Modo Geek / Geek Mode
            ```bash
git clone https://github.com/Colombiano/Alakoro_FiberSense.git
cd Alakoro_FiberSense
pip install -e .
```

            #### 🐳 Docker
            ```bash
            docker pull colombiano/alakoro-fibersense:${{ github.ref_name }}
            ```

            ### 📋 O que há de novo / What's New
            Veja [CHANGELOG.md](CHANGELOG.md) para detalhes completos.
            See [CHANGELOG.md](CHANGELOG.md) for full details.

            ### 🧪 Testes / Tests
            ```bash
            pytest tests/ -v
            ```

            ### 📄 Licença / License
            MIT License — Luiz Paulo Colombiano, 2026
          generate_release_notes: true

  # ─── Build e Push Docker / Build and Push Docker ───
  docker:
    name: 🐳 Docker Build & Push
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: 🏷️  Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: colombiano/alakoro-fibersense
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: 🐳 Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
