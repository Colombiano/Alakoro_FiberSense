# ═══════════════════════════════════════════════════════════════════
# Alakoro FiberSense — CI: Testes e Validação
# CI: Tests and Validation
# ═══════════════════════════════════════════════════════════════════

name: 🧪 Testes / Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 🧪 Testar em Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      # ─── Checkout ───
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      # ─── Setup Python ───
      - name: 🐍 Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ─── Cache pip ───
      - name: 💾 Cache de dependências
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      # ─── Instalar dependências ───
      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── Executar testes ───
      - name: 🧪 Executar pytest
        run: |
          pytest tests/ -v --tb=short --color=yes

      # ─── Cobertura de código ───
      - name: 📊 Gerar cobertura
        run: |
          pip install pytest-cov
          pytest tests/ --cov=src --cov-report=xml --cov-report=term

      # ─── Upload cobertura ───
      - name: ⬆️  Enviar cobertura para Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: 🔍 Lint e Formatação
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8 black
      - name: 🔍 Verificar estilo (flake8)
        run: flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503
      - name: 🎨 Verificar formatação (black)
        run: black --check src/ tests/
