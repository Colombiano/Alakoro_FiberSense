# ═══════════════════════════════════════════════════════════════════
# Alakoro FiberSense — CI: Build Docker
# CI: Docker Build
# ═══════════════════════════════════════════════════════════════════

name: 🐳 Docker Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  docker:
    name: 🐳 Build e Push Docker
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login no Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏷️  Extrair metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: colombiano/alakoro-fibersense
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🐳 Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Verificar imagem
        run: |
          docker run --rm colombiano/alakoro-fibersense:latest \
            python -c "from src.simulation import SignatureGenerator; print('✅ Docker OK')"
