version: "3.8"

services:
  # ==================== Alakoro Core ====================
  alakoro-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: alakoro-fibersense
    restart: unless-stopped
    
    environment:
      - ALAKORO_ENV=production
      - ALAKORO_LOG_LEVEL=INFO
      - ALAKORO_REDIS_URL=redis://redis:6379
      - ALAKORO_RABBITMQ_URL=amqp://rabbitmq:5672
    
    ports:
      - "8000:8000"  # API REST
      - "8080:8080"  # WebSocket
    
    volumes:
      - ../data:/app/data
      - ../config:/app/config
    
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    
    networks:
      - alakoro-network
    
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: alakoro-redis
    restart: unless-stopped
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis-data:/data
    
    networks:
      - alakoro-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== RabbitMQ ====================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: alakoro-rabbitmq
    restart: unless-stopped
    
    environment:
      - RABBITMQ_DEFAULT_USER=alakoro
      - RABBITMQ_DEFAULT_PASS=alakoro123
    
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    
    networks:
      - alakoro-network
    
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== Grafana (Dashboard) ====================
  grafana:
    image: grafana/grafana:latest
    container_name: alakoro-grafana
    restart: unless-stopped
    
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=alakoro
    
    ports:
      - "3000:3000"
    
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    
    networks:
      - alakoro-network

# ==================== Volumes ====================
volumes:
  redis-data:
  rabbitmq-data:
  grafana-data:

# ==================== Networks ====================
networks:
  alakoro-network:
    driver: bridge
    name: alakoro-network
