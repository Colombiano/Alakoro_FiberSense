version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: afs_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: afs_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/exports:/app/data/exports
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: afs_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  celery:
    build: ./backend
    container_name: afs_celery
    command: celery -A app.core.celery worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: afs_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./k8s/base/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

volumes:
  redis_data:
